name: provision-neo4j

# Auto-provisions the ingest-behavior Edge Function with the Neo4j Aura
# credentials for instance 43e46705. The founder never runs a CLI
# command — this workflow pushes Supabase secrets and redeploys the
# function on every relevant change.
#
# Required GitHub secrets (set once, never touched again):
#   - SUPABASE_ACCESS_TOKEN   (account.tokens — Supabase Management API)
#   - SUPABASE_PROJECT_REF    (project ref, e.g. `abcdefghijklmno`)
#   - NEO4J_PASSWORD          (the password shown in the Aura console
#                              after clicking "Reset password" on
#                              instance 43e46705)
#
# Optional overrides (defaults match Aura instance 43e46705):
#   - NEO4J_URI               default: neo4j+s://43e46705.databases.neo4j.io
#   - NEO4J_USERNAME          default: neo4j
#   - NEO4J_DATABASE          default: neo4j
#
# Triggers:
#   - push to main touching the function, SDK, or schema files
#   - manual workflow_dispatch (rotate after a password reset)

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/ingest-behavior/**"
      - "src/lib/behavior.js"
      - ".snippd/neo4j-schema.cypher"
      - ".github/workflows/provision-neo4j.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you re-provisioning? (optional free text for audit log)"
        required: false
        default: "manual rotation"

concurrency:
  group: provision-neo4j
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      NEO4J_URI: ${{ secrets.NEO4J_URI || 'neo4j+s://43e46705.databases.neo4j.io' }}
      NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME || 'neo4j' }}
      NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
      NEO4J_DATABASE: ${{ secrets.NEO4J_DATABASE || 'neo4j' }}
      ALLOWED_ORIGINS: ${{ secrets.SNIPPD_ALLOWED_ORIGINS || 'https://snippd.app,http://localhost:5173,http://localhost:5174' }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_ACTIONS_WEBHOOK_URL }}

    steps:
      - name: Guard — required secrets are set
        run: |
          missing=""
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && missing="$missing SUPABASE_ACCESS_TOKEN"
          [ -z "$SUPABASE_PROJECT_REF"  ] && missing="$missing SUPABASE_PROJECT_REF"
          [ -z "$NEO4J_PASSWORD"        ] && missing="$missing NEO4J_PASSWORD"
          if [ -n "$missing" ]; then
            echo "::warning::Skipping provision — missing repo secrets:$missing"
            echo "The ingest-behavior function will accept + drop events (202 degraded)"
            echo "until these secrets are set. No user-facing impact."
            exit 0
          fi
          echo "all secrets present — proceeding"

      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push secrets to Supabase Edge runtime
        # `supabase secrets set` is idempotent — running it again just
        # overwrites the existing secret. Safe to re-run on every push.
        if: env.NEO4J_PASSWORD != ''
        run: |
          supabase secrets set \
            NEO4J_URI="$NEO4J_URI" \
            NEO4J_USERNAME="$NEO4J_USERNAME" \
            NEO4J_PASSWORD="$NEO4J_PASSWORD" \
            NEO4J_DATABASE="$NEO4J_DATABASE" \
            SNIPPD_ALLOWED_ORIGINS="$ALLOWED_ORIGINS" \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy ingest-behavior function
        if: env.NEO4J_PASSWORD != ''
        run: |
          supabase functions deploy ingest-behavior \
            --no-verify-jwt \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Smoke-test the deployed function
        if: env.NEO4J_PASSWORD != ''
        run: |
          URL="https://${SUPABASE_PROJECT_REF}.functions.supabase.co/ingest-behavior"
          echo "POSTing a synthetic user.signed_in to $URL"
          body='{"type":"user.signed_in","user_id":"ci-smoke","session_id":"ci-'"$GITHUB_RUN_ID"'","at":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}'
          resp=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST "$URL" \
            -H "Origin: https://snippd.app" \
            -H "Content-Type: application/json" \
            --data "$body")
          cat /tmp/resp.json
          echo
          if [ "$resp" != "202" ]; then
            echo "::error::smoke-test expected 202, got $resp"
            exit 1
          fi
          if grep -q '"status":"degraded"' /tmp/resp.json; then
            echo "::error::function returned degraded — secrets may not have propagated"
            exit 1
          fi
          echo "✓ function is writing to Aura"

      - name: Slack notify on success
        if: success() && env.NEO4J_PASSWORD != '' && env.SLACK_WEBHOOK != ''
        run: |
          curl -sS -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d '{"text":":white_check_mark: Neo4j ingest-behavior redeployed against Aura 43e46705 — events now writing to graph. Triggered by `'"$GITHUB_EVENT_NAME"'` on `'"$GITHUB_REF_NAME"'`."}'

      - name: Slack notify on failure
        if: failure() && env.SLACK_WEBHOOK != ''
        run: |
          curl -sS -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d '{"text":":x: Neo4j provision failed — see https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
