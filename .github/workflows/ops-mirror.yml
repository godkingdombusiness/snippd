name: ops-mirror

# Per-department channel routing via GitHub Issues (Slack-compatible).
#
# When any notification workflow completes, this workflow:
#   1. Finds the firmwide [ops] Snippd control center issue (#27)
#      and posts a receipt there. This is the "see everything" feed.
#   2. Finds the relevant per-department channel issue(s) based on the
#      workflow that fired, and posts the same receipt there. This lets
#      department subscribers (founder, future hires, agents) watch only
#      their own channel and get emails for just that scope.
#
# The channel list is label-driven, not hardcoded: we look up issues
# tagged `channel` + the department label (e.g. `dept:cx`). If a
# channel issue is missing or was closed, we warn and skip it — never
# fail the pipeline on visibility infrastructure.
#
# Slack is still called for every message elsewhere (each source
# workflow has its own Slack post step with topic prefix); this file
# only adds the GitHub-email receipt. Dual spine: if Slack is dark, the
# GitHub Issue comment still emails you.

on:
  workflow_run:
    workflows:
      - "App Store review audit"
      - "founder-actions-sync"
      - "reports-cron"
      - "process-approvals"
      - "provision-neo4j"
      - "deploy-delete-account"
      - "slack-smoketest"
      - "slack-diagnose"
    types:
      - completed

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      NAME: ${{ github.event.workflow_run.name }}
      STATUS: ${{ github.event.workflow_run.conclusion }}
      URL: ${{ github.event.workflow_run.html_url }}
      BRANCH: ${{ github.event.workflow_run.head_branch }}
      EVENT: ${{ github.event.workflow_run.event }}
      TITLE: ${{ github.event.workflow_run.display_title }}
    steps:
      - name: Route workflow to topic + departments
        id: route
        run: |
          # topic → human-readable prefix that mirrors Slack convention
          # departments → comma-separated list of dept:* label values
          # dept routing is ADDITIVE to the firmwide [ops] feed — #27
          # always gets every event, so dept:exec is omitted here to
          # avoid double-posting executive-only notifications.
          case "$NAME" in
            "App Store review audit")
              TOPIC="[app-review]"; DEPTS="dept:cx" ;;
            "founder-actions-sync")
              TOPIC="[action-needed]"; DEPTS="" ;;
            "reports-cron")
              TOPIC="[report]"; DEPTS="dept:data" ;;
            "process-approvals")
              TOPIC="[approval]"; DEPTS="" ;;
            "provision-neo4j")
              TOPIC="[provision]"; DEPTS="dept:data" ;;
            "deploy-delete-account")
              TOPIC="[deploy]"; DEPTS="dept:legal,dept:data" ;;
            "slack-smoketest")
              TOPIC="[smoketest]"; DEPTS="" ;;
            "slack-diagnose")
              TOPIC="[diagnose]"; DEPTS="" ;;
            *)
              TOPIC="[ops]"; DEPTS="" ;;
          esac

          ICON="·"
          case "$STATUS" in
            success)   ICON="✓" ;;
            failure)   ICON="✗" ;;
            cancelled) ICON="–" ;;
            skipped)   ICON="○" ;;
          esac

          echo "topic=$TOPIC"    >> "$GITHUB_OUTPUT"
          echo "depts=$DEPTS"    >> "$GITHUB_OUTPUT"
          echo "icon=$ICON"      >> "$GITHUB_OUTPUT"

      - name: Build comment body
        id: body
        env:
          TOPIC: ${{ steps.route.outputs.topic }}
          ICON: ${{ steps.route.outputs.icon }}
        run: |
          {
            printf '%s %s %s — %s\n\n' "$TOPIC" "$ICON" "$STATUS" "$NAME"
            printf -- '- **Trigger:** `%s` on `%s`\n' "$EVENT" "$BRANCH"
            printf -- '- **Title:** %s\n' "$TITLE"
            printf -- '- **Log:** %s\n\n' "$URL"
            printf '%s\n' '_Auto-mirrored from GitHub Actions. This comment is the same event posted to Slack. Subscribe to any channel issue for email notifications on just that scope._'
          } > /tmp/comment.md
          echo "path=/tmp/comment.md" >> "$GITHUB_OUTPUT"

      - name: Post to firmwide [ops] control center
        run: |
          NUM=$(gh issue list \
            --repo "$REPO" \
            --search '[ops] Snippd control center in:title' \
            --state open --limit 1 --json number --jq '.[0].number')
          if [ -z "$NUM" ] || [ "$NUM" = "null" ]; then
            echo "::warning::firmwide [ops] control center issue not found"
          else
            gh issue comment "$NUM" --repo "$REPO" --body-file /tmp/comment.md
            echo "✓ firmwide: issue #$NUM"
          fi

      - name: Post to each department channel
        env:
          DEPTS: ${{ steps.route.outputs.depts }}
        run: |
          if [ -z "$DEPTS" ]; then
            echo "(no department channels for this workflow — firmwide only)"
            exit 0
          fi
          IFS=',' read -r -a DEPT_LIST <<< "$DEPTS"
          for dept in "${DEPT_LIST[@]}"; do
            # channel issues are tagged with both `channel` AND `dept:<name>`.
            NUM=$(gh issue list \
              --repo "$REPO" \
              --label "channel" \
              --label "$dept" \
              --state open --limit 1 --json number --jq '.[0].number')
            if [ -z "$NUM" ] || [ "$NUM" = "null" ]; then
              echo "::warning::no channel issue for $dept (need label 'channel' + '$dept')"
              continue
            fi
            gh issue comment "$NUM" --repo "$REPO" --body-file /tmp/comment.md
            echo "✓ $dept: issue #$NUM"
          done

