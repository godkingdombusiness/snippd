name: Snippd Wins

# Auto-celebrates three trigger classes:
#   1. Every merge into main      → "Ship" win.
#   2. Every GitHub Release       → "Launch" win (with release notes summary).
#   3. Manual dispatch            → Reporter can run an ad-hoc milestone post.
#
# Requires repo secret: SLACK_WINS_WEBHOOK_URL (Slack Incoming Webhook bound
# to #wins). Configure at: Settings → Secrets and variables → Actions.

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      title:
        description: Win headline (short)
        required: true
        type: string
      body:
        description: 1–3 sentence body (Slack markdown ok)
        required: true
        type: string
      kind:
        description: launch | ship | milestone | revenue | crash_free | agent | press
        required: false
        default: milestone
        type: string
      url:
        description: Optional "Open" button URL
        required: false
        type: string

concurrency:
  group: wins-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post-win:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: ${{ env.HAS_WEBHOOK == 'true' || vars.ALWAYS_DRY_RUN == 'true' }}
    env:
      HAS_WEBHOOK: ${{ secrets.SLACK_WINS_WEBHOOK_URL != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Build win payload (push to main)
        if: github.event_name == 'push'
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          FIRST_LINE=$(printf '%s' "$COMMIT_MSG" | head -n 1)
          {
            echo "SNIPPD_WIN_TITLE=Shipped to main: $FIRST_LINE"
            echo "SNIPPD_WIN_BODY=Merged by *$AUTHOR*. Auto-deploy pipeline picking it up now."
            echo "SNIPPD_WIN_KIND=ship"
            echo "SNIPPD_WIN_URL=$COMMIT_URL"
            echo "SNIPPD_WIN_SOURCE=GitHub · push to main"
          } >> "$GITHUB_ENV"

      - name: Build win payload (release)
        if: github.event_name == 'release'
        env:
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          SHORT_BODY=$(printf '%s' "$RELEASE_BODY" | head -c 400)
          {
            echo "SNIPPD_WIN_TITLE=Launch: ${RELEASE_NAME:-$RELEASE_TAG}"
            echo "SNIPPD_WIN_BODY=$SHORT_BODY"
            echo "SNIPPD_WIN_KIND=launch"
            echo "SNIPPD_WIN_URL=$RELEASE_URL"
            echo "SNIPPD_WIN_SOURCE=GitHub · release $RELEASE_TAG"
          } >> "$GITHUB_ENV"

      - name: Build win payload (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          IN_TITLE: ${{ inputs.title }}
          IN_BODY: ${{ inputs.body }}
          IN_KIND: ${{ inputs.kind }}
          IN_URL: ${{ inputs.url }}
        run: |
          {
            echo "SNIPPD_WIN_TITLE=$IN_TITLE"
            echo "SNIPPD_WIN_BODY=$IN_BODY"
            echo "SNIPPD_WIN_KIND=$IN_KIND"
            echo "SNIPPD_WIN_URL=$IN_URL"
            echo "SNIPPD_WIN_SOURCE=GitHub · manual (@${{ github.actor }})"
          } >> "$GITHUB_ENV"

      - name: Post to #wins
        if: env.HAS_WEBHOOK == 'true'
        env:
          SLACK_WINS_WEBHOOK_URL: ${{ secrets.SLACK_WINS_WEBHOOK_URL }}
        run: node scripts/post_win.mjs --from-env

      - name: Dry run (no webhook configured)
        if: env.HAS_WEBHOOK != 'true'
        run: |
          echo "SLACK_WINS_WEBHOOK_URL secret is not set on the repo."
          echo "Would have posted:"
          echo "  title: $SNIPPD_WIN_TITLE"
          echo "  body:  $SNIPPD_WIN_BODY"
          echo "  kind:  $SNIPPD_WIN_KIND"
          echo "Add the secret at Settings → Secrets and variables → Actions."
