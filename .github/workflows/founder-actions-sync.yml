name: founder-actions-sync

# Posts the current Founder Action Queue to #founder-actions in Slack.
#
# Triggers:
#   - PR opened/closed/reopened/ready_for_review on main → the "Open PRs
#     awaiting review" block is now stale; re-post so the queue reflects reality.
#   - push to main when .snippd/founder-actions.json changes → the canonical
#     backlog was edited (by an agent in a PR or by direct commit); re-post.
#   - workflow_dispatch → manual nudge from the GitHub UI if anything feels off.
#   - schedule (daily 14:00 UTC ≈ 9am ET) → daily nudge so the queue can't
#     silently go stale if all other triggers miss for a week.
#
# Uses SLACK_ACTIONS_WEBHOOK_URL if set, otherwise falls back to the
# universal SLACK_WEBHOOK_URL hub. Silently skips (no failure) if neither
# is set — keeps the Actions log clean during bootstrap.

on:
  pull_request:
    types: [opened, closed, reopened, ready_for_review]
    branches: [main]
  push:
    branches: [main]
    paths:
      - ".snippd/founder-actions.json"
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: founder-actions-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The script itself has graceful no-ops when the webhook secret is
      # missing, but we skip the whole job early when we can — keeps the
      # Actions log clean during bootstrap.
      - name: Resolve webhook
        id: check
        env:
          CHANNEL_WEBHOOK: ${{ secrets.SLACK_ACTIONS_WEBHOOK_URL }}
          HUB_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$CHANNEL_WEBHOOK" ]; then
            echo "have_webhook=true" >> "$GITHUB_OUTPUT"
            echo "::notice::using SLACK_ACTIONS_WEBHOOK_URL (channel-specific)"
          elif [ -n "$HUB_WEBHOOK" ]; then
            echo "have_webhook=true" >> "$GITHUB_OUTPUT"
            echo "::notice::using SLACK_WEBHOOK_URL (shared hub)"
          else
            echo "have_webhook=false" >> "$GITHUB_OUTPUT"
            echo "::notice::neither SLACK_ACTIONS_WEBHOOK_URL nor SLACK_WEBHOOK_URL is set — skipping."
          fi

      - name: Sync queue to Slack
        if: steps.check.outputs.have_webhook == 'true'
        env:
          SLACK_ACTIONS_WEBHOOK_URL: ${{ secrets.SLACK_ACTIONS_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL }}
          SLACK_TOPIC_PREFIX: "[action-needed]"
          GITHUB_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: node scripts/sync_founder_actions.mjs
