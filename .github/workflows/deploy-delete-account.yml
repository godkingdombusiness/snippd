name: deploy-delete-account

# Auto-deploys the delete-account Supabase Edge Function whenever it
# changes. The function requires no secrets beyond what Supabase auto-
# injects (SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY)
# plus the NEO4J_* / SNIPPD_ALLOWED_ORIGINS that provision-neo4j.yml
# already pushes to the Edge runtime. So: deploying = one supabase CLI call.
#
# This function is the Apple App Store Review Guideline 5.1.1(v)
# compliance endpoint — if it's not deployed, the Settings → "Delete
# my account" button returns an error banner directing the user to
# email hello@getsnippd.com. Deployment is the difference between
# "compliant" and "compliant with a manual escape hatch."
#
# Required GitHub secrets:
#   - SUPABASE_ACCESS_TOKEN   (account.tokens — Supabase Management API)
#   - SUPABASE_PROJECT_REF    (e.g. `abcdefghijklmno`)
#
# Triggers:
#   - push to main touching the function or this workflow
#   - manual workflow_dispatch (for re-deploy or rotation)
#
# Safe to run repeatedly — `supabase functions deploy` is idempotent.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/delete-account/**"
      - ".github/workflows/deploy-delete-account.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you redeploying? (optional audit log)"
        required: false
        default: "manual redeploy"

concurrency:
  group: deploy-delete-account
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_ACTIONS_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WINS_WEBHOOK_URL }}

    steps:
      - name: Guard — required secrets are set
        run: |
          missing=""
          [ -z "$SUPABASE_ACCESS_TOKEN" ] && missing="$missing SUPABASE_ACCESS_TOKEN"
          [ -z "$SUPABASE_PROJECT_REF"  ] && missing="$missing SUPABASE_PROJECT_REF"
          if [ -n "$missing" ]; then
            echo "::warning::Skipping deploy — missing repo secrets:$missing"
            echo "The Settings → Delete my account button will show an error"
            echo "banner directing users to hello@getsnippd.com until these are set."
            exit 0
          fi
          echo "secrets present — proceeding"

      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy delete-account function
        if: env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_PROJECT_REF != ''
        # --no-verify-jwt: we validate the caller's JWT inside the function
        # ourselves via supabase.auth.getUser(token). The default JWT check
        # would require the anon key in the header, adding friction without
        # extra security.
        run: |
          supabase functions deploy delete-account \
            --no-verify-jwt \
            --project-ref "$SUPABASE_PROJECT_REF"

      - name: Smoke-test — endpoint returns 401 without a token
        if: env.SUPABASE_ACCESS_TOKEN != '' && env.SUPABASE_PROJECT_REF != ''
        run: |
          URL="https://${SUPABASE_PROJECT_REF}.functions.supabase.co/delete-account"
          echo "POSTing to $URL without auth — expect 401"
          resp=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST "$URL" \
            -H "Origin: https://snippd.app" \
            -H "Content-Type: application/json" \
            --data '{}')
          cat /tmp/resp.json
          echo
          if [ "$resp" != "401" ]; then
            echo "::error::expected 401 for unauth call, got $resp — deployment may be wrong"
            exit 1
          fi
          echo "✓ function rejects unauthenticated calls"

      - name: Slack notify on success
        if: success() && env.SUPABASE_ACCESS_TOKEN != '' && env.SLACK_WEBHOOK != ''
        run: |
          curl -sS -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d '{"text":"*[provision]* :white_check_mark: delete-account Edge Function redeployed — Apple 5.1.1(v) compliance endpoint live. Triggered by `'"$GITHUB_EVENT_NAME"'` on `'"$GITHUB_REF_NAME"'`."}'

      - name: Slack notify on failure
        if: failure() && env.SLACK_WEBHOOK != ''
        run: |
          curl -sS -X POST "$SLACK_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d '{"text":"*[provision]* :x: delete-account deploy failed — see https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
